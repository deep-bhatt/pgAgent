# Core
listen_addresses = '*'
max_connections = 100

# pg_stat_statements
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000

# Conservative autovacuum (so pgAgent has things to detect)
autovacuum = on
autovacuum_naptime = 300
autovacuum_vacuum_threshold = 10000
autovacuum_analyze_threshold = 10000
autovacuum_vacuum_scale_factor = 0.5
autovacuum_analyze_scale_factor = 0.5

# Logging
log_statement = 'none'
log_min_duration_statement = 1000

# Checkpoints (conservative to trigger forced checkpoint detection)
checkpoint_timeout = 30min
max_wal_size = 256MB

# BGWriter (conservative to trigger backend write detection)
bgwriter_lru_maxpages = 50
bgwriter_delay = 500ms

# Track activity
track_activities = on
track_counts = on
track_io_timing = on
